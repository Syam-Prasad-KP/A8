<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A8(2do list)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h2 class="text-center">My 2do list</h2>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-4">
                            <input type="text" class="form-control" placeholder="Enter a task..." id="taskInput">
                            <button class="btn btn-success" onclick="addTask()">Add task</button>
                        </div>
                        <div id="taskContainer">

                        </div>
                        <div class="text-center text-muted d-none" id="message">
                            <p>No task added yet</p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
